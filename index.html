<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to ICO Converter | Fast Media Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a10;
      --card-bg: #121420;
      --control-bg: #181b2a;
      --neon-cyan: #00f0ff;
      --neon-purple: #bd00ff;
      --neon-pink: #ff007a;
      --text: #f3f4f6;
      --text-muted: #6272a4;
      --glass-border: rgba(0, 240, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(189, 0, 255, 0.05) 0%, transparent 45%);
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 2.2rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .drop-zone {
      border: 2px dashed rgba(0, 240, 255, 0.15);
      border-radius: 8px;
      padding: 3.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--neon-cyan);
      background: rgba(0, 240, 255, 0.02);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
    }

    .drop-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.4));
    }

    .drop-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .drop-text span {
      color: var(--neon-cyan);
      font-weight: 600;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    select {
      background: var(--control-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 0.8rem 1rem;
      border-radius: 6px;
      outline: none;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    select:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
    }

    .btn {
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      color: #000;
      border: none;
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .btn:disabled {
      background: #1b1e2a;
      color: var(--text-muted);
      cursor: not-allowed;
      border: 1px solid rgba(255,255,255,0.02);
    }

    .status {
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      font-weight: 500;
    }

    .status.success {
      display: block;
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .status.error {
      display: block;
      background: rgba(255, 0, 122, 0.08);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink);
    }

    .status.loading {
      display: block;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    #file-input {
      display: none;
    }

    .file-info {
      font-size: 0.85rem;
      color: var(--neon-cyan);
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <h1>IMG to ICO Converter</h1>
      <p>Быстрая конвертация изображений PNG/JPEG в иконки (.ico)</p>
    </header>

    <div class="panel">
      <form id="convert-form">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">💾</div>
          <div class="drop-text" id="drop-prompt">
            Перетащите файл сюда или <span>выберите на компьютере</span>
          </div>
          <div class="file-info" id="file-info"></div>
          <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg">
        </div>

        <div class="settings" style="margin-top: 1.5rem;">
          <label for="size">Размер иконки</label>
          <select id="size">
            <option value="all">Все размеры (16x16, 32x32, 48x48, 256x256)</option>
            <option value="16">16 x 16 (Favicon)</option>
            <option value="32">32 x 32 (Favicon HD)</option>
            <option value="48">48 x 48 (Windows App)</option>
            <option value="256">256 x 256 (High Quality)</option>
          </select>
        </div>

        <button type="submit" class="btn" id="submit-btn" style="width: 100%; margin-top: 1.5rem;" disabled>
          Конвертировать
        </button>
      </form>

      <div class="status" id="status-message"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const dropPrompt = document.getElementById('drop-prompt');
    const fileInfo = document.getElementById('file-info');
    const submitBtn = document.getElementById('submit-btn');
    const form = document.getElementById('convert-form');
    const statusMsg = document.getElementById('status-message');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
      }, false);
    });

    dropZone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    function handleFileSelect(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('Ошибка: Файл должен быть изображением (PNG или JPEG)!', 'error');
        selectedFile = null;
        submitBtn.disabled = true;
        fileInfo.style.display = 'none';
        dropPrompt.style.display = 'block';
        return;
      }

      selectedFile = file;
      dropPrompt.style.display = 'none';
      fileInfo.textContent = `Выбран файл: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      fileInfo.style.display = 'block';
      submitBtn.disabled = false;
      hideStatus();
    }

    // Client-Side ICO Generation Engine
    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function convertToIco(file, sizes) {
      const img = await loadImage(file);
      const pngBlobs = [];
      
      for (let size of sizes) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const arrayBuffer = await blob.arrayBuffer();
        pngBlobs.push(new Uint8Array(arrayBuffer));
      }
      
      const headerSize = 6;
      const entrySize = 16;
      let currentDataOffset = headerSize + pngBlobs.length * entrySize;
      const icoParts = [];
      
      // Header: 6 bytes
      const header = new ArrayBuffer(headerSize);
      const headerView = new DataView(header);
      headerView.setUint16(0, 0, true);
      headerView.setUint16(2, 1, true); // 1 = ICO
      headerView.setUint16(4, pngBlobs.length, true);
      icoParts.push(new Uint8Array(header));
      
      // Entries: 16 bytes each
      for (let i = 0; i < pngBlobs.length; i++) {
        const pngBytes = pngBlobs[i];
        const size = sizes[i];
        const entry = new ArrayBuffer(entrySize);
        const entryView = new DataView(entry);
        
        entryView.setUint8(0, size === 256 ? 0 : size);
        entryView.setUint8(1, size === 256 ? 0 : size);
        entryView.setUint8(2, 0);
        entryView.setUint8(3, 0);
        entryView.setUint16(4, 1, true);
        entryView.setUint16(6, 32, true);
        entryView.setUint32(8, pngBytes.length, true);
        entryView.setUint32(12, currentDataOffset, true);
        
        icoParts.push(new Uint8Array(entry));
        currentDataOffset += pngBytes.length;
      }
      
      // Data Parts
      for (let pngBytes of pngBlobs) {
        icoParts.push(pngBytes);
      }
      
      return new Blob(icoParts, { type: 'image/x-icon' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedFile) return;

      const sizeOption = document.getElementById('size').value;
      let targetSizes = [];
      if (sizeOption === 'all') {
        targetSizes = [16, 32, 48, 256];
      } else {
        targetSizes = [parseInt(sizeOption)];
      }

      showStatus('Конвертация в браузере... Пожалуйста, подождите', 'loading');
      submitBtn.disabled = true;

      try {
        const icoBlob = await convertToIco(selectedFile, targetSizes);
        
        const url = window.URL.createObjectURL(icoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = selectedFile.name.split('.')[0] + '.ico';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

        showStatus('Успешно сконвертировано! Скачивание началось.', 'success');
      } catch (err) {
        showStatus('Ошибка при конвертации: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showStatus(text, type) {
      statusMsg.textContent = text;
      statusMsg.className = `status ${type}`;
    }

    function hideStatus() {
      statusMsg.style.display = 'none';
    }
  </script>
</body>
</html>
