<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICO Lab | Image to ICO Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              black: '#07080e',
              dark: '#0e111d',
              card: '#161b2e',
              accent: '#00f5d4',
              purple: '#7b2cbf',
            }
          }
        }
      }
    }
  </script>
  <style>
    .bg-synth-grid {
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 245, 212, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(123, 44, 191, 0.05) 0%, transparent 45%);
    }

    .spring-transition {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s ease;
    }

    .depth-base {
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    }
    .depth-elevated {
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .depth-floating {
      box-shadow: 0 12px 30px rgba(0,245,212,0.1), 0 1px 0 rgba(255,255,255,0.05);
    }
  </style>
</head>
<body class="bg-brand-black text-slate-200 min-h-screen flex flex-col items-center justify-center bg-synth-grid relative overflow-hidden">

  <!-- SVG Noise Filter for Grain/Texture -->
  <svg class="absolute inset-0 w-full h-full opacity-[0.015] pointer-events-none z-50" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <div class="container w-full max-w-[500px] p-4 z-10 flex flex-col gap-4">
    <header class="text-center">
      <h1 class="font-display text-3xl font-extrabold tracking-[-0.03em] uppercase bg-gradient-to-r from-brand-accent to-brand-purple bg-clip-text text-transparent">ICO Converter Lab</h1>
      <p class="font-mono text-xs text-brand-accent tracking-widest uppercase mt-1">Оптимизированный ИИ-Генератор</p>
    </header>

    <div class="panel bg-brand-dark border border-white/5 rounded-xl p-6 depth-elevated flex flex-col gap-5">
      <form id="convert-form" class="flex flex-col gap-5">
        <div class="drop-zone border-2 border-dashed border-brand-accent/20 rounded-lg p-10 text-center cursor-pointer bg-brand-black/20 flex flex-col items-center gap-4 spring-transition hover:border-brand-accent hover:bg-brand-accent/5" id="drop-zone">
          <div class="drop-icon text-3xl filter drop-shadow-[0_0_10px_rgba(0,245,212,0.4)]">💾</div>
          <div class="drop-text text-xs text-slate-400 leading-relaxed" id="drop-prompt">
            Перетащите файл сюда или <span class="text-brand-accent font-semibold">выберите на компьютере</span>
          </div>
          <div class="file-info text-xs text-brand-accent font-semibold hidden" id="file-info"></div>
          <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg" class="hidden">
        </div>

        <div class="settings flex flex-col gap-2">
          <label for="size" class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">Размер иконки</label>
          <select id="size" class="bg-brand-card border border-white/5 text-slate-200 py-3 px-4 rounded-md outline-none text-sm cursor-pointer spring-transition focus:border-brand-accent">
            <option value="all">Все размеры (16x16, 32x32, 48x48, 256x256)</option>
            <option value="16">16 x 16 (Favicon)</option>
            <option value="32">32 x 32 (Favicon HD)</option>
            <option value="48">48 x 48 (Windows App)</option>
            <option value="256">256 x 256 (High Quality)</option>
          </select>
        </div>

        <button type="submit" class="btn bg-gradient-to-r from-brand-accent to-brand-purple text-black font-extrabold text-xs uppercase tracking-wider py-4.5 rounded-md spring-transition hover:-translate-y-0.5 hover:shadow-[0_0_20px_rgba(0,245,212,0.4)] disabled:bg-neutral-800 disabled:text-neutral-500 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none" id="submit-btn" disabled>
          Конвертировать
        </button>
      </form>

      <div class="status text-xs p-3 rounded-md text-center hidden font-medium" id="status-message"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const dropPrompt = document.getElementById('drop-prompt');
    const fileInfo = document.getElementById('file-info');
    const submitBtn = document.getElementById('submit-btn');
    const form = document.getElementById('convert-form');
    const statusMsg = document.getElementById('status-message');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('bg-brand-accent/5', 'border-brand-accent');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('bg-brand-accent/5', 'border-brand-accent');
      }, false);
    });

    dropZone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    function handleFileSelect(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('Ошибка: Файл должен быть изображением (PNG или JPEG)!', 'error');
        selectedFile = null;
        submitBtn.disabled = true;
        fileInfo.classList.add('hidden');
        dropPrompt.classList.remove('hidden');
        return;
      }

      selectedFile = file;
      dropPrompt.classList.add('hidden');
      fileInfo.textContent = `Выбран файл: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      fileInfo.classList.remove('hidden');
      submitBtn.disabled = false;
      hideStatus();
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function convertToIco(file, sizes) {
      const img = await loadImage(file);
      const pngBlobs = [];
      
      for (let size of sizes) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const arrayBuffer = await blob.arrayBuffer();
        pngBlobs.push(new Uint8Array(arrayBuffer));
      }
      
      const headerSize = 6;
      const entrySize = 16;
      let currentDataOffset = headerSize + pngBlobs.length * entrySize;
      const icoParts = [];
      
      const header = new ArrayBuffer(headerSize);
      const headerView = new DataView(header);
      headerView.setUint16(0, 0, true);
      headerView.setUint16(2, 1, true);
      headerView.setUint16(4, pngBlobs.length, true);
      icoParts.push(new Uint8Array(header));
      
      for (let i = 0; i < pngBlobs.length; i++) {
        const pngBytes = pngBlobs[i];
        const size = sizes[i];
        const entry = new ArrayBuffer(entrySize);
        const entryView = new DataView(entry);
        
        entryView.setUint8(0, size === 256 ? 0 : size);
        entryView.setUint8(1, size === 256 ? 0 : size);
        entryView.setUint8(2, 0);
        entryView.setUint8(3, 0);
        entryView.setUint16(4, 1, true);
        entryView.setUint16(6, 32, true);
        entryView.setUint32(8, pngBytes.length, true);
        entryView.setUint32(12, currentDataOffset, true);
        
        icoParts.push(new Uint8Array(entry));
        currentDataOffset += pngBytes.length;
      }
      
      for (let pngBytes of pngBlobs) {
        icoParts.push(pngBytes);
      }
      
      return new Blob(icoParts, { type: 'image/x-icon' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedFile) return;

      const sizeOption = document.getElementById('size').value;
      let targetSizes = [];
      if (sizeOption === 'all') {
        targetSizes = [16, 32, 48, 256];
      } else {
        targetSizes = [parseInt(sizeOption)];
      }

      showStatus('Конвертация в браузере... Пожалуйста, подождите', 'loading');
      submitBtn.disabled = true;

      try {
        const icoBlob = await convertToIco(selectedFile, targetSizes);
        
        const url = window.URL.createObjectURL(icoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = selectedFile.name.split('.')[0] + '.ico';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

        showStatus('Успешно сконвертировано! Скачивание началось.', 'success');
      } catch (err) {
        showStatus('Ошибка при конвертации: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showStatus(text, type) {
      statusMsg.textContent = text;
      statusMsg.className = `status text-xs p-3 rounded-md text-center font-medium block`;
      if (type === 'success') {
        statusMsg.classList.add('bg-brand-accent/10', 'border', 'border-brand-accent', 'text-brand-accent');
      } else if (type === 'error') {
        statusMsg.classList.add('bg-red-500/10', 'border', 'border-red-500', 'text-red-400');
      } else {
        statusMsg.classList.add('bg-white/5', 'border', 'border-white/5', 'text-slate-300');
      }
    }

    function hideStatus() {
      statusMsg.classList.add('hidden');
      statusMsg.classList.remove('block');
    }
  </script>
</body>
</html>
